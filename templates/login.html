{% extends "base.html" %}
{% block title %}Login — BOOA Agent{% endblock %}
{% block subtitle %}admin login{% endblock %}

{% block content %}
<div class="card">
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <label>
      <span>Username</span>
      <input type="text" name="username" required autofocus>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" required>
    </label>
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
